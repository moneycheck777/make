<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Economic Insight Dashboard</title>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: sans-serif; padding: 20px; }
        .news-card { background: #1e1e1e; border: 1px solid #333; padding: 15px; margin-bottom: 10px; border-radius: 8px; }
        .news-card a { color: #4caf50; text-decoration: none; font-size: 1.2em; font-weight: bold; }
        .news-card p { color: #888; font-size: 0.9em; }
    </style>
</head>
<body>
    <h1>경제 뉴스 대시보드</h1>
    <div id="news-container">로딩 중...</div>

    <script>
        // news_data_pro_v2.json 파일을 불러와서 화면에 출력
        fetch('news_data_pro_v2.json')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('news-container');
                container.innerHTML = ''; // 로딩 텍스트 제거
                
                data.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'news-card';
                    div.innerHTML = `
                        <a href="${item.link}" target="_blank">${item.title}</a>
                        <p>분류: ${item.category} | 출처: ${item.source}</p>
                    `;
                    container.appendChild(div);
                });
            })
            .catch(error => {
                document.getElementById('news-container').innerText = '데이터를 불러오는 데 실패했습니다.';
            });
    </script>
</body>
</html>
